name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-ci:
    name: Backend CI (Python / FastAPI)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Install Backend Dependencies
        run: uv sync --dev

      - name: Run Ruff Format Check
        run: uv run ruff format --check .

      - name: Run Ruff Lint Audit
        run: uv run ruff check .

      - name: Run Type Verification (mypy)
        run: uv run mypy . --ignore-missing-imports

      - name: Run Unit Tests (pytest)
        # We run tests with database and redis mock environments configured in pytest
        run: uv run pytest

  frontend-ci:
    name: Frontend CI (Node / Next.js)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Run ESLint Audit
        run: npm run lint

      - name: Run Build Compilation Test
        run: npm run build
